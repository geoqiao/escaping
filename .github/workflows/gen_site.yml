name: Generate Github_blog site

on:
  workflow_dispatch:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  push:
    branches:
      - main
    paths:
      - main.py

jobs:
  sync:
    name: Generate Site
    runs-on: ubuntu-latest
    if: github.repository_owner_id == github.event.issue.user.id || github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Generate contents
        run: |
          uv run blog-gen ${{ secrets.G_T }} ${{ github.repository }}

      - name: Push contents
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 使用 -A 选项以确保删除不再存在的旧文件（如旧的数字 ID HTML）
          git add -A contents robots.txt sitemap.xml index.html
          git commit -m 'chore: update blog with new slug format and cleanup old files' || echo "nothing to commit"
          git push || echo "nothing to push"

{% extends "base.html" %}

{% block content %}
<section class="tags-page">
    <h1>All Tags</h1>
    
    <div class="tag-cloud">
        {% for tag in tag_items %}
        <a href="/tag/{{ tag.name }}/" class="tag-item" style="--size: {{ 0.9 + tag.count * 0.15 }}rem;">
            {{ tag.name }}<span class="tag-count">{{ tag.count }}</span>
        </a>
        {% endfor %}
    </div>
</section>
{% endblock %}
